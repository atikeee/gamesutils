<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --surface: #161b22; --accent: #58a6ff; --text: #e6edf3; 
            --card-w: 45px; --card-h: 65px; /* Smaller for mobile, scales up for PC */
        }
        @media (min-width: 600px) { :root { --card-w: 65px; --card-h: 95px; } }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #info-header { background: var(--surface); padding: 5px 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; height: 45px; }
        #scoreboard { background: #1c2330; padding: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; border-bottom: 1px solid #30363d; font-size: 0.85rem; }
        
        #game-table { 
            flex: 1; display: grid; 
            grid-template-areas: ". north ." "west center east" ". south ."; 
            grid-template-rows: 1fr 1.5fr 1fr; grid-template-columns: 0.8fr 1.4fr 0.8fr; 
            padding: 5px; position: relative; 
        }

        .player-area { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; height: 100%; }
        .north { grid-area: north; } .south { grid-area: south; } .east { grid-area: east; } .west { grid-area: west; } .center { grid-area: center; }

        .name-tag { font-size: 0.7rem; background: #30363d; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; z-index: 10; white-space: nowrap; }
        .dealer-badge { border: 1px solid #ffca28; color: #ffca28; font-weight: bold; }
        
        #deal-btn { 
            position: absolute; top: 8px; right: 10px; background: #238636; color: white; border: 1px solid rgba(255,255,255,0.2); 
            padding: 4px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.75rem; z-index: 1000;
        }

        .hand-container { 
            display: flex; justify-content: center; align-items: center; 
            width: 100%; height: var(--card-h); position: relative; 
        }

        /* Linear overlapping cards */
        .card { 
            width: var(--card-w); height: var(--card-h); background: white; color: black; 
            border-radius: 4px; position: absolute; display: flex; flex-direction: column; 
            padding: 3px; box-sizing: border-box; font-weight: bold; 
            box-shadow: -2px 0 5px rgba(0,0,0,0.3); font-size: 0.8rem; border: 1px solid #999;
        }
        .card.red { color: #d12e2e; }
        .card-suit { font-size: 1.1rem; margin-top: auto; text-align: right; }

        #trick-area { width: 100px; height: 100px; border: 1px dashed #30363d; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
    </style>
</head>
<body>

<div id="info-header">
    <div>Rd: <span id="round-num">1</span> | Pass: <b id="passcode-display" style="color: #ffca28;">---</b></div>
    <button id="deal-btn" onclick="requestDeal()" style="display:none;">Deal</button>
</div>

<div id="scoreboard">
    <div style="color: #58a6ff">NS: <span id="score-NS">0</span></div>
    <div style="color: #8b949e">Bid: <span id="current-bid">None</span></div>
    <div style="color: #f78166">EW: <span id="score-EW">0</span></div>
</div>

<div id="game-table">
    <div class="player-area north"><div class="name-tag" id="tag-top">Top</div><div class="hand-container" id="hand-top"></div></div>
    <div class="player-area west"><div class="name-tag" id="tag-left">Left</div><div class="hand-container" id="hand-left"></div></div>
    
    <div class="player-area center">
        <div id="trick-area"></div>
    </div>

    <div class="player-area east"><div class="name-tag" id="tag-right">Right</div><div class="hand-container" id="hand-right"></div></div>
    <div class="player-area south"><div class="name-tag" id="tag-bottom">You</div><div class="hand-container" id="hand-bottom"></div></div>
</div>

<script>
    const socket = io();
    const roomId = "{{ room_id }}";
    const myDir = "{{ direction }}"; // N, S, E, or W

    document.getElementById('passcode-display').innerText = localStorage.getItem('bridge_v2_pass');

    socket.on('connect', () => {
        socket.emit('join_bridge_room', { room_id: roomId });
    });

    // Helper to map global directions (N,E,S,W) to local UI positions (bottom, top, left, right)
    function getLocalPos(dir) {
        const order = ["N", "E", "S", "W"];
        const diff = (order.indexOf(dir) - order.indexOf(myDir) + 4) % 4;
        return ["bottom", "right", "top", "left"][diff];
    }

    socket.on('game_state_update', (data) => {
        if (!data || !data.game) return;
        const game = data.game;
        const players = data.players || {};
        
        // 1. Dealer Check
        const dealerOrder = ["W", "N", "E", "S"];
        const currentDealerDir = dealerOrder[game.round % 4];
        
        // 2. Clear and Update Player UI
        let joinedCount = 0;
        ['N','E','S','W'].forEach(dir => {
            const pos = getLocalPos(dir);
            const tag = document.getElementById(`tag-${pos}`);
            if (players[dir]) {
                tag.innerText = `${dir}: ${players[dir].name}`;
                joinedCount++;
            } else {
                tag.innerText = `${dir}: Empty`;
            }
            tag.classList.toggle('dealer-badge', currentDealerDir === dir);
        });

        // 3. Deal Button Visibility
        const dealBtn = document.getElementById('deal-btn');
        // Logic: Phase must be waiting, 4 players must be in, and YOU must be dealer
        if (game.phase === 'waiting' && joinedCount === 4 && currentDealerDir === myDir) {
            dealBtn.style.display = 'block';
        } else {
            dealBtn.style.display = 'none';
        }

        // 4. Scoreboard
        document.getElementById('round-num').innerText = game.round || 1;
        document.getElementById('score-NS').innerText = game.tricks_won?.NS || 0;
        document.getElementById('score-EW').innerText = game.tricks_won?.EW || 0;
        document.getElementById('current-bid').innerText = game.current_bid || "None";

        // 5. Render Hands
        ['N', 'E', 'S', 'W'].forEach(dir => {
            const pos = getLocalPos(dir);
            const isMe = (dir === myDir);
            const isDummy = (game.dummy === dir);
            
            // Show cards if it's Me OR if it's the Dummy (after bidding)
            const showCards = isMe || isDummy;
            renderHand(`hand-${pos}`, game.hands[dir], !showCards);
        });
    });

    function requestDeal() {
        socket.emit('request_deal', { room_id: roomId });
    }

    function renderHand(containerId, cards, isHidden) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        if (!cards || cards.length === 0) return;

        cards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = `card ${ (card.suit === 'H' || card.suit === 'D') ? 'red' : '' }`;
            
            // Linear presentation with slight overlap
            const overlap = (window.innerWidth < 600) ? 14 : 20; 
            const x = (index - (cards.length - 1) / 2) * overlap;
            
            cardEl.style.transform = `translateX(${x}px)`;
            cardEl.style.zIndex = index;

            if (isHidden) {
                cardEl.style.background = "linear-gradient(135deg, #1e4d8c 0%, #0d2a54 100%)";
                cardEl.style.border = "1px solid #58a6ff";
            } else {
                cardEl.innerHTML = `<div>${card.val}</div><div class="card-suit">${getSuitChar(card.suit)}</div>`;
                cardEl.onclick = () => console.log("Played:", card);
            }
            container.appendChild(cardEl);
        });
    }

    function getSuitChar(s) { return {'S':'♠','H':'♥','D':'♦','C':'♣'}[s] || s; }
</script>
</body>
</html>
