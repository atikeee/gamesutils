<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>

:root { 
    --bg: #0d1117; --surface: #161b22; --accent: #58a6ff; --text: #e6edf3; 
    --card-w: 85px; --card-h: 125px; 
}
@media (max-width: 600px) { :root { --card-w: 70px; --card-h: 105px; } }

body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
#bid-table, table { border-collapse: collapse; margin: 0 auto; }
#bid-table th, #bid-table td,
table th, table td {
    border: 1px solid #30363d;
    padding: 6px 14px;
    text-align: center;
}
#bid-table th, table th {
    background: #21262d;
    color: var(--accent);
}
#bid-table td, table td { color: var(--text); }
/* --- HEADER --- */
#info-header { background: var(--surface); padding: 5px 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; height: 45px; }

/* --- TABLE GRID --- */
#game-table {
    display: grid;
    grid-template-areas: ". top ." "left center right" ". bottom .";
    grid-template-columns: 100px 1fr 100px;
    grid-template-rows: 130px 1fr 130px;
    height: calc(100vh - 45px);
}

.player-area { display: flex; align-items: center; justify-content: center; position: relative; }
.center { grid-area: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

/* --- LABELS (Outer edge positioning) --- */
[style*="grid-area: bottom"] { flex-direction: column-reverse; }
[style*="grid-area: top"]    { flex-direction: column; }
[style*="grid-area: left"]   { flex-direction: row; }
[style*="grid-area: right"]  { flex-direction: row-reverse; }

.name-tag { font-size: 0.85rem; background: #161b22; padding: 6px 10px; border-radius: 4px; border: 1px solid #30363d; color: #e6edf3; z-index: 100; white-space: nowrap; }
#tag-left  { transform: rotate(90deg); }
#tag-right { transform: rotate(-90deg); }

.active-turn { 
    background: #ffce00 !important; color: #b90000 !important; 
    border: 2px solid #b90000 !important; font-weight: 900; 
    box-shadow: 0 0 20px rgba(255, 206, 0, 0.8);
}

/* --- CARDS --- */
.card { 
    width: var(--card-w); height: var(--card-h); background: white; color: black; 
    border-radius: 8px; display: flex; flex-direction: column; padding: 5px; 
    box-sizing: border-box; border: 1px solid #777;
}
.card.red { color: #ff4d4d !important; }

/* CENTER TRICK AREA (Restore Absolute positioning) */
#trick-area { position: relative; width: 300px; height: 290px; }
.played-card { position: absolute !important; }
.pos-top    { top: 0;    left: 50%; transform: translateX(-50%); }
.pos-bottom { bottom: 0; left: 50%; transform: translateX(-50%); }
.pos-left   { left: 0;   top: 50%; transform: translateY(-50%); }
.pos-right  { right: 0;  top: 50%; transform: translateY(-50%); }

/* --- HAND CONTAINERS --- */
.hand-container { display: flex; position: relative; justify-content: center; align-items: center; }

/* Top/Bottom Horizontal */
#hand-top .card, #hand-bottom .card { position: absolute; }

/* Left/Right Vertical */
#hand-left, #hand-right { flex-direction: column; width: auto; }
#hand-left .card, #hand-right .card { 
    position: relative !important; 
    transform: rotate(90deg) !important; 
    margin: -48px 0 !important; 
}
#hand-left  { margin-left: -35px; }
#hand-right { margin-right: -35px; transform: rotate(180deg); }

/* --- BUTTONS & CONTROLS --- */
.control-panel { position: fixed; bottom: 15px; z-index: 4000; display: flex; gap: 8px; }
#left-controls { left: 10px; }
#right-controls { right: 10px; }

.ctrl-btn { 
    background: #21262d; color: white; border: 1px solid #30363d; 
    padding: 10px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; 
}
.btn-green { background: #238636; border: none; }
.btn-red { background: #d12e2e; border: none; }
.ctrl-btn:disabled { opacity: 0.3; }

select#claim-count { background: #21262d; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 4px; }

/* --- SYMBOLS --- */
.card-info { text-align: left; display: flex; flex-direction: column; line-height: 1.1; font-weight: 900; }
.card-info-bottom { position: absolute; bottom: 5px; right: 5px; transform: rotate(180deg); display: flex; flex-direction: column; font-weight: 900; }
    </style>
</head>
<body>
<div id="info-header">
    <div>
        Rd <span id="round-num">1</span> | 
        <span id="status-msg" style="font-weight: bold; color: #fff;">...</span> | 
        <span id="current-bid-display" style="color: var(--accent); font-weight: bold;"></span>
    </div>
    <div id="extra-controls" style="padding: 5px; display: flex; gap: 10px;">
    <button onclick="toggleModal('bidding-modal')">View Bidding</button>
    <button onclick="toggleModal('trick-modal')">Last 4 Cards</button>
    </div>
    <div id="dealer-controls">
        <button id="deal-btn" onclick="requestDeal()" style="display:none;">Deal</button>
        <div id="declarer-select" style="display:none;">
            <span style="font-size: 0.8rem;">Pick Declarer:</span>
            <button class="bid-btn" style="padding: 2px 8px;" onclick="setDeclarer('N')">N</button>
            <button class="bid-btn" style="padding: 2px 8px;" onclick="setDeclarer('E')">E</button>
            <button class="bid-btn" style="padding: 2px 8px;" onclick="setDeclarer('S')">S</button>
            <button class="bid-btn" style="padding: 2px 8px;" onclick="setDeclarer('W')">W</button>
        </div>
    </div>
</div>
<div id="game-table">
    <div class="player-area" style="grid-area: top">
        <div class="name-tag" id="tag-top">
            <span id="name-top"></span>
            <span class="score-pill">Tricks: <span id="score-top">0</span></span>
        </div>
        <div class="hand-container" id="hand-top"></div>
    </div>

    <div class="player-area" style="grid-area: left">
        <div class="name-tag" id="tag-left">
            <span id="name-left"></span>
            <span class="score-pill">Tricks: <span id="score-left">0</span></span>
        </div>
        <div class="hand-container" id="hand-left"></div>
    </div>

    <div class="player-area center">
        <div id="trick-area"></div>

        <div id="claim-ui" style="display:none; background: var(--surface); padding: 10px; border-radius: 8px; border: 1px solid var(--accent); z-index: 3000; margin-bottom: 10px;">
            <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">Claim remaining tricks:</label>
            <div style="display: flex; gap: 5px;">
                <select id="claim-count" style="flex: 1; background: #21262d; color: white; border: 1px solid #30363d; border-radius: 4px;"></select>
                <button class="bid-btn" style="padding: 5px 15px; margin: 0;" onclick="sendClaim()">Claim</button>
            </div>
        </div>

        <div id="claim-approval" style="display:none; background: #1c2330; padding: 15px; border-radius: 8px; border: 2px solid #d12e2e; text-align: center; z-index: 3000;">
            <p id="claim-msg" style="margin-bottom: 10px; font-weight: bold;"></p>
            <div style="display: flex; gap: 10px;">
                <button onclick="respondClaim('approve')" style="flex:1; background: #238636; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">Approve</button>
                <button onclick="respondClaim('reject')" style="flex:1; background: #d12e2e; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">Reject</button>
            </div>
        </div>

        <div id="history-container">
            <table id="bid-table">
                <thead><tr><th>N</th><th>E</th><th>S</th><th>W</th></tr></thead>
                <tbody id="bid-history-body"></tbody>
            </table>
        </div>

        <div id="bidding-input">
            <div class="bid-row">
                <button class="bid-btn" onclick="setLevel(1)">1</button>
                <button class="bid-btn" onclick="setLevel(2)">2</button>
                <button class="bid-btn" onclick="setLevel(3)">3</button>
                <button class="bid-btn" onclick="setLevel(4)">4</button>
                <button class="bid-btn" onclick="setLevel(5)">5</button>
                <button class="bid-btn" onclick="setLevel(6)">6</button>
                <button class="bid-btn" onclick="setLevel(7)">7</button>
            </div>
            <div class="bid-row">
                <button class="bid-btn" onclick="setStrain('C')">♣</button>
                <button class="bid-btn" onclick="setStrain('D')">♦</button>
                <button class="bid-btn" onclick="setStrain('H')">♥</button>
                <button class="bid-btn" onclick="setStrain('S')">♠</button>
                <button class="bid-btn" onclick="setStrain('NT')">NT</button>
            </div>
            <div class="bid-row">
                <button class="bid-btn" style="background:#484f58" onclick="selectSpecial('Pass')">Pass</button>
                <button class="bid-btn" style="background:#d12e2e" onclick="selectSpecial('X')">X</button>
                <button class="bid-btn" style="background:#7d1a1a" onclick="selectSpecial('XX')">XX</button>
            </div>
            <button class="bid-btn" id="confirm-bid-btn" onclick="submitFinalBid()">Confirm Bid</button>
        </div>
    </div>

    <div class="player-area" style="grid-area: right">
        <div class="name-tag" id="tag-right">
            <span id="name-right"></span>
            <span class="score-pill">Tricks: <span id="score-right">0</span></span>
        </div>
        <div class="hand-container" id="hand-right"></div>
    </div>

    <div class="player-area" style="grid-area: bottom">
        <div class="name-tag" id="tag-bottom">
            <span id="name-bottom"></span>
            <span class="score-pill">Tricks: <span id="score-bottom">0</span></span>
        </div>
        <div class="hand-container" id="hand-bottom"></div>
    </div>
    <div id="left-controls" class="control-panel">
        <select id="claim-count"></select>
        <button id="btn-claim" class="ctrl-btn btn-green" onclick="sendClaim()">Claim</button>
        <button id="btn-approve" class="ctrl-btn btn-green" onclick="respondClaim('approve')" disabled>Approve</button>
        <button id="btn-reject" class="ctrl-btn btn-red" onclick="respondClaim('reject')" disabled>Reject</button>
        </div>

    <div id="right-controls" class="control-panel">
    <button id="btn-undo" class="ctrl-btn" onclick="requestUndo()">Undo</button>
    <button id="btn-end" class="ctrl-btn btn-red" onclick="requestEndRound()">End Round</button>
    </div>
    
    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
    <div id="modal-content" style="background:var(--surface); padding:20px; border-radius:8px; min-width:300px; max-width:90%; position:relative;">
        <div id="modal-body"></div>
        <button onclick="toggleModal()" style="margin-top:20px; width:100%; background:#d12e2e; color:white; border:none; padding:10px; border-radius:4px;">Close</button>
    </div>
    </div>
</div>

<script>
    const socket = io();
    const roomId = "{{ room_id }}";
    const myDir = "{{ direction }}";
    let game = {}; 
    let lastCompletedTrick = [];
    let curLevel = 0;
    let curStrain = "";

    const SUIT_SYMBOLS = { 'S': '♠', 'H': '♥', 'D': '♦', 'C': '♣', 'NT': 'NT', 'Pass': 'P', 'X': 'X', 'XX': 'XX' };

    socket.on('connect', () => socket.emit('join_bridge_room', { room_id: roomId }));

    function getLocalPos(dir) {
        const order = ["N", "E", "S", "W"];
        const diff = (order.indexOf(dir) - order.indexOf(myDir) + 4) % 4;
        return ["bottom", "right", "top", "left"][diff];
    }

socket.on('game_state_update', (data) => {
    game = data.game;
    players = data.players;

    const { phase, current_player, current_bidder, dummy, dummy_revealed, hands, current_trick, highest_bid, claim_data } = game;

    // --- 1. PHASE CONSTANTS ---
    const isPlay = (phase === 'play');
    const isBidding = (phase === 'bidding');
    const isWaiting = (phase === 'waiting');
    const isPickingDeclarer = (phase === 'picking_declarer');

    // --- 2. UI VISIBILITY (Bidding & Headers) ---
    document.getElementById('history-container').style.display = (isBidding || isPickingDeclarer) ? 'block' : 'none';
    document.getElementById('bidding-input').style.display = (isBidding && current_bidder === myDir) ? 'flex' : 'none';
    
    const bidDisplay = document.getElementById('current-bid-display');
    if (highest_bid && highest_bid.level > 0) {
        bidDisplay.innerText = `Bid: ${highest_bid.level}${SUIT_SYMBOLS[highest_bid.strain]} (${game.declarer || "TBD"})`;
    } else {
        bidDisplay.innerText = "";
    }

    document.getElementById('deal-btn').style.display = (isWaiting && game.dealer === myDir) ? 'block' : 'none';
    const decSelect = document.getElementById('declarer-select');
    if (decSelect) decSelect.style.display = (isPickingDeclarer && game.dealer === myDir) ? 'inline-block' : 'none';
    
    
    
    
    // 1. Update Round Number Display
    const roundNumEl = document.getElementById('round-num');
    if (roundNumEl) roundNumEl.innerText = game.round_num || 1;

    // 2. Updated Status Messages with Player Names
    const statusMsg = document.getElementById('status-msg');
    
    const getPlayerName = (dir) => {
        return (players[dir] && players[dir].name) ? players[dir].name : dir;
    };

    if (isWaiting) {
        statusMsg.innerText = `Waiting for Dealer (${getPlayerName(game.dealer)}) to deal...`;
    } else if (isPickingDeclarer) {
        statusMsg.innerText = (game.dealer === myDir) ? "CHOOSE DECLARER" : `${getPlayerName(game.dealer)} is choosing...`;
    } else if (isBidding) {
        const bidderName = getPlayerName(game.current_bidder);
        statusMsg.innerText = (game.current_bidder === myDir) ? "YOUR BID" : `Waiting for ${bidderName}...`;
    } else if (isPlay) {
        // Fix: Show "Now Playing: <PlayerName>"
        const activeName = getPlayerName(game.current_player);
        statusMsg.innerText = (game.current_player === myDir) ? "YOUR TURN" : `Now Playing: ${activeName}`;
    }
    // --- 4. PLAYER TAGS & SCORES ---
    ['N', 'E', 'S', 'W'].forEach(dir => {
        const localPos = getLocalPos(dir);
        const nameEl = document.getElementById(`name-${localPos}`);
        const scoreEl = document.getElementById(`score-${localPos}`);
        const tagEl = document.getElementById(`tag-${localPos}`);

        if (nameEl) nameEl.innerText = (players[dir] ? players[dir].name : dir);
        if (scoreEl) {
            const team = (['N', 'S'].includes(dir)) ? 'NS' : 'EW';
            scoreEl.innerText = game.tricks_won[team] || 0;
        }

        if (tagEl) {
            const isTurn = (isBidding && current_bidder === dir) || (isPlay && current_player === dir);
            tagEl.classList.toggle('active-turn', isTurn);
            tagEl.style.border = isTurn ? "2px solid var(--accent)" : "2px solid transparent";
        }
    });

    // --- 5. GAME CONTROL PANELS (Bottom Corners) ---
    const leftPanel = document.getElementById('left-controls');
    const rightPanel = document.getElementById('right-controls');
    leftPanel.style.display = isPlay ? 'flex' : 'none';
    rightPanel.style.display = isPlay ? 'flex' : 'none';

    if (isPlay) {
        const remaining = 13 - (game.tricks_won.NS + game.tricks_won.EW);
        
        
        // You can claim if you are the current player and it's time to lead/start a trick
        
        const isWaitingForResponse = !!claim_data;

        // Global lock to stop card clicks
        window.gameLocked = isWaitingForResponse;

        // Claim UI Elements
        const btnApprove = document.getElementById('btn-approve');
        const btnReject = document.getElementById('btn-reject');
        
        
        
        
        // --- UPDATED CLAIM LOGIC ---
        const btnClaim = document.getElementById('btn-claim');
        const claimSelect = document.getElementById('claim-count');
        
        // Updated condition: check if either table is empty OR full, and it's your turn
        const isTrickEmpty = (!current_trick || current_trick.length === 0);
        const isTrickComplete = (current_trick && current_trick.length === 4);
        const isMyLeadTurn = (isTrickEmpty || isTrickComplete) && (current_player === myDir);

        btnClaim.disabled = !isMyLeadTurn || !!claim_data || remaining === 0;
        
        // FORCE POPULATE: If it's your turn and dropdown is empty, fill it
        if (isMyLeadTurn && !claim_data && (claimSelect.children.length === 0 || claimSelect.dataset.lastRem != remaining)) {
            claimSelect.innerHTML = '';
            for(let i=1; i<=remaining; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = i;
                if(i === remaining) opt.selected = true;
                claimSelect.appendChild(opt);
            }
            claimSelect.dataset.lastRem = remaining; // Prevent constant flickering
        }
        
        
        
        // Enable Claim only if it's your lead, no claim is pending, and cards remain
        btnClaim.disabled = !isMyLeadTurn || isWaitingForResponse || remaining === 0;
        
        // Repopulate dropdown only when it's valid to claim and not currently waiting
        if (isMyLeadTurn && !isWaitingForResponse) {
            // We only refresh the list if the current count is different to avoid UI flickering
            if (claimSelect.children.length !== remaining) {
                claimSelect.innerHTML = '';
                for(let i=1; i<=remaining; i++) {
                    let opt = document.createElement('option');
                    opt.value = i; opt.innerText = i;
                    if(i === remaining) opt.selected = true;
                    claimSelect.appendChild(opt);
                }
            }
        }

        // Approval Logic: Enable buttons for opponents when a claim is active
        if (isWaitingForResponse) {
            const claimerTeam = (['N', 'S'].includes(claim_data.claimer)) ? 'NS' : 'EW';
            const myTeam = (['N', 'S'].includes(myDir)) ? 'NS' : 'EW';
            const isOpponent = (claimerTeam !== myTeam); 
            
            btnApprove.disabled = !isOpponent;
            btnReject.disabled = !isOpponent;
            
            // Optional: Update button text to show who is claiming
            btnClaim.innerText = "Pending...";
        } else {
            btnApprove.disabled = true;
            btnReject.disabled = true;
            btnClaim.innerText = "Claim";
        }
    }
    // --- 6. RENDER HANDS & TRICK ---
    renderTrick(current_trick || []);

    renderHands(hands, myDir);
    if (isBidding || isPickingDeclarer) {
        renderHistory(game.bid_history, game.dealer);
    }
    if (game.last_completed_trick) {
        lastCompletedTrick = game.last_completed_trick;
    }
});
    
    // Ensure the pick declarer function passes your direction for security check
    function setDeclarer(dir) {
        socket.emit('set_declarer', { 
            room_id: roomId, 
            declarer: dir,
            direction: myDir // Added this for the backend check
        });
    }
    function requestDeal() { socket.emit('request_deal', { room_id: roomId }); }
    
    
    // --- NEW FUNCTIONS ---
    function sendClaim() {
        const count = document.getElementById('claim-count').value;
        socket.emit('claim_tricks', { room_id: roomId, direction: myDir, amount: count });
    }

    function respondClaim(type) {
        socket.emit('respond_claim', { room_id: roomId, direction: myDir, response: type });
    }

    function requestEndRound() {
        if (confirm("Are you sure you want to end this round early? Scores will be finalized as they are.")) {
            socket.emit('force_end_round', { room_id: roomId, direction: myDir });
        }
    }
    
    function renderHand(containerId, cards, isHidden, seatDir, game) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    if (!cards) return;

    const isSide = containerId.includes('left') || containerId.includes('right');

    cards.forEach((card, index) => {
        const cardEl = document.createElement('div');
        const isRed = (card.suit === 'H' || card.suit === 'D');
        cardEl.className = `card ${isRed ? 'red' : ''}`;
        
        if (!isSide) {
            // ONLY Top and Bottom get the horizontal fan calculation
            const x = (index - (cards.length - 1) / 2) * (window.innerWidth < 600 ? 20 : 28);
            cardEl.style.transform = `translateX(${x}px)`;
            cardEl.style.position = "absolute";
        } else {
            // Side cards MUST be relative to stack top-to-bottom
            cardEl.style.position = "relative";
        }
        
        cardEl.style.zIndex = index;

        if (isHidden) {
            cardEl.style.background = "linear-gradient(135deg, #1e4d8c 0%, #0d2a54 100%)";
            cardEl.style.border = "1px solid #fff";
        } else {
            cardEl.innerHTML = `
                <div class="card-info">
                    <span class="card-val-top">${card.val}</span>
                    <span class="card-suit-top">${SUIT_SYMBOLS[card.suit]}</span>
                </div>
                <div class="card-info-bottom">
                    <span class="card-val-top">${card.val}</span>
                    <span class="card-suit-top">${SUIT_SYMBOLS[card.suit]}</span>
                </div>`;
            
            cardEl.onclick = () => {
                if (window.gameLocked) return;
                const canIPlayThis = (seatDir === myDir && game.current_player === myDir) || 
                                   (seatDir === game.dummy && game.current_player === game.dummy && myDir === game.declarer);

                if (canIPlayThis) {
                    if (cardEl.classList.contains('selected')) {
                        socket.emit('play_card', { room_id: roomId, direction: myDir, seat: seatDir, card_index: index });
                    } else {
                        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                        cardEl.classList.add('selected');
                    }
                }
            };
        }
        container.appendChild(cardEl);
    });
}


    function renderTrick(trick) {
        const area = document.getElementById('trick-area');
        area.innerHTML = '';
        trick.forEach(p => {
            const div = document.createElement('div');
            const pos = getLocalPos(p.player);
            div.className = `card played-card pos-${pos} ${['H','D'].includes(p.card.suit) ? 'red' : ''}`;
            div.innerHTML = `<div class="card-info"><span class="card-val-top">${p.card.val}</span><span class="card-suit-top">${SUIT_SYMBOLS[p.card.suit]}</span></div>`;
            area.appendChild(div);
        });
    }

    function renderHistory(history, dealer) {
        const body = document.getElementById('bid-history-body');
        body.innerHTML = '';
        let row = document.createElement('tr');
        const order = ["N", "E", "S", "W"];
        let startIdx = order.indexOf(dealer);
        for(let j=0; j<startIdx; j++) row.appendChild(document.createElement('td'));

        history.forEach((b) => {
            if (row.children.length === 4) { body.appendChild(row); row = document.createElement('tr'); }
            const td = document.createElement('td');
            td.innerText = (b.level > 0 ? b.level : '') + SUIT_SYMBOLS[b.strain];
            row.appendChild(td);
        });
        body.appendChild(row);
    }

    function setLevel(n) { curLevel = n; updateBidButtons(); }
    function setStrain(s) { curStrain = s; updateBidButtons(); }
    function selectSpecial(type) { curLevel = 0; curStrain = type; updateBidButtons(); }
    
    function updateBidButtons() {
        document.querySelectorAll('.bid-btn').forEach(b => {
            const isMatch = b.innerText == curLevel || b.innerText == SUIT_SYMBOLS[curStrain] || b.innerText == curStrain;
            b.classList.toggle('active', isMatch);
        });
    }

    function submitFinalBid() {
        if (!curStrain) return;
        socket.emit('submit_bid', { room_id: roomId, level: curLevel, strain: curStrain });
        curLevel = 0; curStrain = "";
        document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
    }
    
    

// Call this inside your game_state_update whenever a trick is cleared
function updateLastTrick(trick) {
    if (trick.length === 4) {
        lastCompletedTrick = [...trick];
    }
}
function toggleModal(type) {
    const overlay = document.getElementById('modal-overlay');
    const body = document.getElementById('modal-body');
    
    // Close modal if no type is provided
    if (!type) {
        overlay.style.display = 'none';
        return;
    }

    body.innerHTML = ''; // Clear previous content

    if (type === 'bidding-modal') {
        body.innerHTML = '<h3>Bidding History</h3>';
        
        // Create a fresh table to avoid visibility conflicts with the main UI
        const table = document.createElement('table');
        table.style.width = "100%";
        table.style.display = "table"; // Force visibility
        table.innerHTML = `
            <thead>
                <tr><th>N</th><th>E</th><th>S</th><th>W</th></tr>
            </thead>
            <tbody id="modal-table-body"></tbody>
        `;
        body.appendChild(table);

        // Populate the table using the global 'game' object
        if (game && game.bid_history && game.bid_history.length > 0) {
            renderHistoryToTarget(game.bid_history, game.dealer, 'modal-table-body');
        } else {
            body.innerHTML += '<p style="padding:20px;">No bids have been made yet.</p>';
        }

    } else if (type === 'trick-modal') {
    body.innerHTML = '<h3>Last 4 Cards Played</h3>';
    const trickToShow = game.last_completed_trick || [];

    if (trickToShow.length === 0) {
        body.innerHTML += '<p style="padding:20px;">No tricks finished yet.</p>';
    } else {
        const container = document.createElement('div');
        container.style.cssText = 'display:flex; justify-content:center; align-items:center; position:relative; height:140px; margin-top:10px;';

        trickToShow.forEach((item, index) => {
            const c = item.card;
            const isRed = (c.suit === 'H' || c.suit === 'D');
            const cardEl = document.createElement('div');
            cardEl.className = `card ${isRed ? 'red' : ''}`;
            const x = (index - (trickToShow.length - 1) / 2) * 60; // 60px spacing like hand
            cardEl.style.cssText = `position:absolute; transform:translateX(${x}px); z-index:${index};`;
            cardEl.innerHTML = `
                <div class="card-info">
                    <span>${c.val}</span>
                    <span>${SUIT_SYMBOLS[c.suit]}</span>
                </div>`;
            container.appendChild(cardEl);
        });

        body.appendChild(container);
    }
}
    
    overlay.style.display = 'flex';
}

/**
 * Helper to render the bidding history into the modal's specific table body
 */
function renderHistoryToTarget(history, dealer, targetId) {
    const tbody = document.getElementById(targetId);
    if (!tbody) return;
    
    let row = document.createElement('tr');
    const order = ["N", "E", "S", "W"];
    let startIdx = order.indexOf(dealer);
    
    // Add empty cells for the lead-up to the dealer
    for(let j=0; j<startIdx; j++) {
        row.appendChild(document.createElement('td'));
    }

    history.forEach((b) => {
        if (row.children.length === 4) {
            tbody.appendChild(row);
            row = document.createElement('tr');
        }
        const td = document.createElement('td');
        // Handle Pass, Double, and Redouble symbols
        const symbol = b.strain === 'Pass' ? 'P' : 
                      (b.strain === 'X' ? 'X' : 
                      (b.strain === 'XX' ? 'XX' : SUIT_SYMBOLS[b.strain]));
        
        td.innerText = (b.level > 0 ? b.level : '') + symbol;
        if (b.strain === 'H' || b.strain === 'D') td.style.color = 'red';
        row.appendChild(td);
    });
    tbody.appendChild(row);
}
function renderHands(hands, viewer) {
    const order = ["N", "E", "S", "W"];
    const viewerIdx = order.indexOf(viewer);

    // This maps the seat directions to the table positions
    const positions = {
        bottom: viewer,
        right: order[(viewerIdx + 1) % 4],
        top: order[(viewerIdx + 2) % 4],
        left: order[(viewerIdx + 3) % 4]
    };

    Object.keys(positions).forEach(pos => {
        const seatDir = positions[pos];
        const containerId = `hand-${pos}`;
        const cards = hands[seatDir] || [];
        
        // Visibility: Show if it's your hand or if it's the revealed dummy
        const isDummy = (seatDir === game.dummy && game.dummy_revealed);
        const shouldShow = (seatDir === myDir) || isDummy || game.reveal_all;

        renderHand(containerId, cards, !shouldShow, seatDir, game);
    });
}
