<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --surface: #161b22; --accent: #58a6ff; --text: #e6edf3; 
            --card-w: 85px; --card-h: 125px; 
        }
        @media (max-width: 600px) { :root { --card-w: 70px; --card-h: 105px; } }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #info-header { background: var(--surface); padding: 5px 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; height: 45px; }
        #deal-btn { background: #238636; color: white; border: none; padding: 6px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #game-table { flex: 1; display: grid; grid-template-areas: ". top ." "left center right" ". bottom ."; grid-template-rows: 1fr 2fr 1.2fr; grid-template-columns: 0.6fr 1.8fr 0.6fr; padding: 5px; }
        
        .player-area { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .center { grid-area: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        #bidding-input { 
            position: absolute; background: rgba(22, 27, 34, 0.98); border: 2px solid var(--accent); 
            padding: 15px; border-radius: 12px; z-index: 2000; display: none; flex-direction: column; gap: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9); width: 95%; max-width: 320px;
        }
        .bid-row { display: flex; justify-content: space-between; gap: 5px; }
        .bid-btn { flex: 1; padding: 12px 2px; background: #21262d; border: 1px solid #30363d; color: white; border-radius: 6px; font-weight: bold; font-size: 1.1rem; }
        .bid-btn.active { background: var(--accent); border-color: white; }
        #confirm-bid-btn { background: #238636; margin-top: 5px; font-size: 1.2rem; }

        #history-container { display: none; width: 100%; max-height: 150px; overflow-y: auto; background: #1c2330; border-radius: 4px; border: 1px solid #30363d; }
        #bid-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; text-align: center; }
        #bid-table td { padding: 6px; border: 1px solid #30363d; }

        .hand-container { display: flex; justify-content: center; align-items: center; width: 100%; height: var(--card-h); position: relative; }
        .card { 
            width: var(--card-w); height: var(--card-h); background: white; color: black; 
            border-radius: 8px; position: absolute; display: flex; flex-direction: column; 
            padding: 5px; box-sizing: border-box; transition: transform 0.2s;
            box-shadow: -4px 0 10px rgba(0,0,0,0.5); border: 1px solid #777;
        }
        .card.selected { transform: translateY(-40px) !important; z-index: 2000 !important; border: 3px solid var(--accent); }
        .card.red { color: #d12e2e; }
        
        .card-info { text-align: left; display: flex; flex-direction: column; line-height: 1.1; font-weight: 900; }
        .card-val-top { font-size: 1.3rem; }
        .card-suit-top { font-size: 1.5rem; }

        .name-tag { font-size: 0.8rem; background: #30363d; padding: 4px 12px; border-radius: 6px; z-index: 10; border: 2px solid transparent; }
        .active-turn { border-color: var(--accent); color: var(--accent); }
        
        #trick-area { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .played-card { position: absolute; width: var(--card-w); height: var(--card-h); }
        .pos-top { top: -20px; }
        .pos-bottom { bottom: -20px; }
        .pos-right { right: -20px; }
        .pos-left { left: -20px; }
        
        #info-header { 
            background: var(--surface); 
            padding: 5px 15px; 
            border-bottom: 1px solid #30363d; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 45px; 
        }
    </style>
</head>
<body>

<div id="info-header">
    <div>Rd <span id="round-num">1</span> | <span id="status-msg">...</span></div>
    <button id="deal-btn" onclick="requestDeal()" style="display:none;">Deal</button>
</div>

<div id="game-table">
        <div class="player-area" style="grid-area: top">
        <div class="name-tag" id="tag-top">
            <span id="name-top"></span>
            <span class="score-pill">Tricks: <span id="score-top">0</span></span>
        </div>
        <div class="hand-container" id="hand-top"></div>
    </div>

    <div class="player-area" style="grid-area: left">
        <div class="name-tag" id="tag-left">
            <span id="name-left"></span>
            <span class="score-pill">Tricks: <span id="score-left">0</span></span>
        </div>
        <div class="hand-container" id="hand-left"></div>
    </div>
    <div class="player-area center">
    <div id="trick-area"></div>

    <div id="claim-ui" style="display:none; background: var(--surface); padding: 10px; border-radius: 8px; border: 1px solid var(--accent); z-index: 3000; margin-bottom: 10px;">
        <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">Claim remaining tricks:</label>
        <div style="display: flex; gap: 5px;">
            <select id="claim-count" style="flex: 1; background: #21262d; color: white; border: 1px solid #30363d; border-radius: 4px;"></select>
            <button class="bid-btn" style="padding: 5px 15px; margin: 0;" onclick="sendClaim()">Claim</button>
        </div>
    </div>

    <div id="claim-approval" style="display:none; background: #1c2330; padding: 15px; border-radius: 8px; border: 2px solid #d12e2e; text-align: center; z-index: 3000;">
        <p id="claim-msg" style="margin-bottom: 10px; font-weight: bold;"></p>
        <div style="display: flex; gap: 10px;">
            <button onclick="respondClaim('approve')" style="flex:1; background: #238636; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">Approve</button>
            <button onclick="respondClaim('reject')" style="flex:1; background: #d12e2e; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">Reject</button>
        </div>
    </div>

    <div id="history-container">
        <table id="bid-table">
            <thead><tr><th>N</th><th>E</th><th>S</th><th>W</th></tr></thead>
            <tbody id="bid-history-body"></tbody>
        </table>
    </div>

    <div id="bidding-input">
        <div class="bid-row">
            <button class="bid-btn" onclick="setLevel(1)">1</button>
            <button class="bid-btn" onclick="setLevel(2)">2</button>
            <button class="bid-btn" onclick="setLevel(3)">3</button>
            <button class="bid-btn" onclick="setLevel(4)">4</button>
            <button class="bid-btn" onclick="setLevel(5)">5</button>
            <button class="bid-btn" onclick="setLevel(6)">6</button>
            <button class="bid-btn" onclick="setLevel(7)">7</button>
        </div>
        <div class="bid-row">
            <button class="bid-btn" onclick="setStrain('C')">♣</button>
            <button class="bid-btn" onclick="setStrain('D')">♦</button>
            <button class="bid-btn" onclick="setStrain('H')">♥</button>
            <button class="bid-btn" onclick="setStrain('S')">♠</button>
            <button class="bid-btn" onclick="setStrain('NT')">NT</button>
        </div>
        <div class="bid-row">
            <button class="bid-btn" style="background:#484f58" onclick="selectSpecial('Pass')">Pass</button>
            <button class="bid-btn" style="background:#d12e2e" onclick="selectSpecial('X')">X</button>
            <button class="bid-btn" style="background:#7d1a1a" onclick="selectSpecial('XX')">XX</button>
        </div>
        <button class="bid-btn" id="confirm-bid-btn" onclick="submitFinalBid()">Confirm Bid</button>
    </div>
</div>



<div class="player-area" style="grid-area: right">
    <div class="name-tag" id="tag-right">
        <span id="name-right"></span>
        <span class="score-pill">Tricks: <span id="score-right">0</span></span>
    </div>
    <div class="hand-container" id="hand-right"></div>
</div>

<div class="player-area" style="grid-area: bottom">
    <div class="name-tag" id="tag-bottom">
        <span id="name-bottom"></span>
        <span class="score-pill">Tricks: <span id="score-bottom">0</span></span>
    </div>
    <div class="hand-container" id="hand-bottom"></div>
</div>
    
</div>

<script>
    const socket = io();
    const roomId = "{{ room_id }}";
    const myDir = "{{ direction }}";
    let curLevel = 0;
    let curStrain = "";

    const SUIT_SYMBOLS = { 'S': '♠', 'H': '♥', 'D': '♦', 'C': '♣', 'NT': 'NT', 'Pass': 'P', 'X': 'X', 'XX': 'XX' };

    socket.on('connect', () => socket.emit('join_bridge_room', { room_id: roomId }));

    function getLocalPos(dir) {
        const order = ["N", "E", "S", "W"];
        const diff = (order.indexOf(dir) - order.indexOf(myDir) + 4) % 4;
        return ["bottom", "right", "top", "left"][diff];
    }

socket.on('game_state_update', (data) => {
    const game = data.game;
    const players = data.players;
    const isPlay = (game.phase === 'play');
    const isBidding = (game.phase === 'bidding');
    const isWaiting = (game.phase === 'waiting');

    // --- RESTORED DEAL BUTTON LOGIC ---
    // The button shows only if we are waiting for a new round AND I am the dealer
    const dealBtn = document.getElementById('deal-btn');
    if (isWaiting && game.dealer === myDir) {
        dealBtn.style.display = 'block';
    } else {
        dealBtn.style.display = 'none';
    }

    // Update Status Message
    const statusMsg = document.getElementById('status-msg');
    if (isWaiting) statusMsg.innerText = "Waiting for Deal...";
    if (isBidding) statusMsg.innerText = (game.current_bidder === myDir) ? "YOUR BID" : `Waiting for ${game.current_bidder}...`;
    if (isPlay) statusMsg.innerText = (game.current_player === myDir) ? "YOUR TURN" : `Waiting for ${game.current_player}...`;

    // 1. UPDATE TEAM SCORES
    ['N','E','S','W'].forEach(dir => {
        const pos = getLocalPos(dir);
        const team = (dir === 'N' || dir === 'S') ? 'NS' : 'EW';
        
        // Update names
        const nameSpan = document.getElementById(`name-${pos}`);
        if (nameSpan) nameSpan.innerText = players[dir] ? `${dir}: ${players[dir].name}` : `${dir}: Empty`;
        
        // Update scores
        const scoreSpan = document.getElementById(`score-${pos}`);
        if (scoreSpan) scoreSpan.innerText = game.tricks_won[team] || 0;

        // Highlight active turn
        const tag = document.getElementById(`tag-${pos}`);
        const isHisTurn = isBidding ? (game.current_bidder === dir) : (game.current_player === dir);
        tag.classList.toggle('active-turn', isHisTurn);
    });

    // 2. CLEAR CENTER ON NEW TRICK
    if (game.current_trick && game.current_trick.length === 0) {
        document.getElementById('trick-area').innerHTML = '';
    } else {
        renderTrick(game.current_trick || []);
    }

    // 3. SHOW/HIDE BIDDING UI
    document.getElementById('history-container').style.display = isBidding ? 'block' : 'none';
    document.getElementById('bidding-input').style.display = (isBidding && game.current_bidder === myDir) ? 'flex' : 'none';

    // 4. RENDER HANDS
    ['N','E','S','W'].forEach(dir => {
        renderHand(`hand-${getLocalPos(dir)}`, game.hands[dir], (dir !== myDir));
    });
    
    if (isBidding) renderHistory(game.bid_history, game.dealer);

    // 5. CLAIM UI LOGIC (Restore this at the bottom)
    const remaining = 13 - ((game.tricks_won.NS || 0) + (game.tricks_won.EW || 0));
    const claimUI = document.getElementById('claim-ui');
    
    if (isPlay && game.current_player === myDir && remaining > 0) {
        claimUI.style.display = 'block';
        const select = document.getElementById('claim-count');
        if (select.options.length !== remaining) { 
            select.innerHTML = '';
            for(let i=1; i<=remaining; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = i;
                if (i === remaining) opt.selected = true;
                select.appendChild(opt);
            }
        }
    } else {
        claimUI.style.display = 'none';
    }

    // 6. CLAIM APPROVAL POPUP
    const approvalUI = document.getElementById('claim-approval');
    if (game.claim_data && game.claim_data.claimer !== myDir) {
        approvalUI.style.display = 'block';
        document.getElementById('claim-msg').innerText = 
            `${game.claim_data.claimer} claims ${game.claim_data.amount} tricks`;
    } else {
        approvalUI.style.display = 'none';
    }
});

// FUNCTIONS TO CALL SERVER
function sendClaim() {
    const amt = document.getElementById('claim-count').value;
    socket.emit('claim_tricks', { room_id: roomId, direction: myDir, amount: amt });
}

function respondClaim(response) {
    socket.emit('respond_claim', { room_id: roomId, direction: myDir, response: response });
}

    function renderHand(containerId, cards, isHidden) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!cards) return;
        cards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = `card ${ (card.suit === 'H' || card.suit === 'D') ? 'red' : '' }`;
            const x = (index - (cards.length - 1) / 2) * (window.innerWidth < 600 ? 20 : 28);
            cardEl.style.transform = `translateX(${x}px)`;
            cardEl.style.zIndex = index;
            
            if (isHidden) {
                cardEl.style.background = "linear-gradient(135deg, #1e4d8c 0%, #0d2a54 100%)";
            } else {
                cardEl.innerHTML = `<div class="card-info"><span class="card-val-top">${card.val}</span><span class="card-suit-top">${SUIT_SYMBOLS[card.suit]}</span></div>`;
                cardEl.onclick = () => {
                    if (cardEl.classList.contains('selected')) {
                        socket.emit('play_card', { room_id: roomId, direction: myDir, card_index: index });
                    } else {
                        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                        cardEl.classList.add('selected');
                    }
                };
            }
            container.appendChild(cardEl);
        });
    }

    function renderTrick(trick) {
        const area = document.getElementById('trick-area');
        area.innerHTML = '';
        trick.forEach(p => {
            const div = document.createElement('div');
            const pos = getLocalPos(p.player);
            div.className = `card played-card pos-${pos} ${['H','D'].includes(p.card.suit) ? 'red' : ''}`;
            div.innerHTML = `<div class="card-info"><span class="card-val-top">${p.card.val}</span><span class="card-suit-top">${SUIT_SYMBOLS[p.card.suit]}</span></div>`;
            area.appendChild(div);
        });
    }

    function renderHistory(history, dealer) {
        const body = document.getElementById('bid-history-body');
        body.innerHTML = '';
        let row = document.createElement('tr');
        const order = ["N", "E", "S", "W"];
        let startIdx = order.indexOf(dealer);
        for(let j=0; j<startIdx; j++) row.appendChild(document.createElement('td'));

        history.forEach((b, i) => {
            if (row.children.length === 4) { body.appendChild(row); row = document.createElement('tr'); }
            const td = document.createElement('td');
            td.innerText = (b.level > 0 ? b.level : '') + SUIT_SYMBOLS[b.strain];
            row.appendChild(td);
        });
        body.appendChild(row);
    }

    function setLevel(n) { curLevel = n; updateBidButtons(); }
    function setStrain(s) { curStrain = s; updateBidButtons(); }
    function selectSpecial(type) { curLevel = 0; curStrain = type; updateBidButtons(); }
    
    function updateBidButtons() {
        document.querySelectorAll('.bid-btn').forEach(b => {
            const isMatch = b.innerText == curLevel || b.innerText == SUIT_SYMBOLS[curStrain] || b.innerText == curStrain;
            b.classList.toggle('active', isMatch);
        });
    }

    function submitFinalBid() {
        if (!curStrain) return;
        socket.emit('submit_bid', { room_id: roomId, level: curLevel, strain: curStrain });
        curLevel = 0; curStrain = "";
        document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
    }

    function requestDeal() { socket.emit('request_deal', { room_id: roomId }); }
</script>
</body>
</html>
