<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Bridge Game Score</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:           #eef1f6;
      --surface:      #ffffff;
      --surface2:     #f4f6fa;
      --border:       #ced4de;
      --border-strong:#9aa3b5;
      --text:         #1c2030;
      --text-mid:     #4a5168;
      --text-soft:    #8890a8;
      --ns-bg:        #ddeeff;
      --ns-border:    #2563eb;
      --ns-head:      #1a4db8;
      --ns-score:     #1a4db8;
      --ew-bg:        #fde8e4;
      --ew-border:    #dc3a1e;
      --ew-head:      #b82a10;
      --ew-score:     #b82a10;
      --neg:          #b82a10;
      --vul-tint:     rgba(180,30,10,0.08);   /* row bg tint for vulnerable cols */
      --vul-stripe:   #e05030;                /* left stripe color */
      --header-bg:    #1c2030;
      --shadow-sm:    0 1px 4px rgba(0,0,0,0.08);
      --shadow-md:    0 4px 18px rgba(0,0,0,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      padding-bottom: 80px;
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    .header {
      background: var(--header-bg);
      padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .header a { color: #9aa3b5; text-decoration: none; font-size: 15px; font-weight: 600; white-space: nowrap; }
    .header a:hover { color: #fff; }
    .header h1 { font-size: 20px; font-weight: 900; color: #fff; flex: 1; text-align: center; }
    .suits { font-size: 20px; letter-spacing: 2px; }
    .suit-blk { color: #e0e4ee; }
    .suit-red { color: #f07070; }

    /* ── SYNC STATUS ── */
    .sync-bar {
      background: #2d3350; padding: 5px 16px;
      font-size: 12px; font-weight: 700; color: #9aa3b5;
      display: flex; align-items: center; gap: 8px;
    }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #9aa3b5; transition: background 0.3s; }
    .sync-dot.live    { background: #4caf78; }
    .sync-dot.syncing { background: #f0b040; }
    .sync-dot.error   { background: #e05050; }

    /* ── SCOREBOARD ── */
    .scoreboard {
      display: flex; margin: 14px 14px 0;
      border-radius: 14px; overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .score-ns {
      flex: 1; background: var(--ns-bg);
      border: 2px solid var(--ns-border); border-right: none;
      border-radius: 14px 0 0 14px; text-align: center; padding: 14px 8px 12px;
    }
    .score-ew {
      flex: 1; background: var(--ew-bg);
      border: 2px solid var(--ew-border); border-left: none;
      border-radius: 0 14px 14px 0; text-align: center; padding: 14px 8px 12px;
    }
    /* Vulnerable state — deeper red tint on scoreboard panel */
    .score-ns.is-vul { background: #ffd0cc; border-color: #c02010; }
    .score-ew.is-vul { background: #ffd0cc; border-color: #c02010; }
    .vul-badge {
      display: inline-block; font-size: 10px; font-weight: 900;
      letter-spacing: 1px; padding: 1px 6px; border-radius: 10px;
      background: #c02010; color: #fff; margin-top: 4px; vertical-align: middle;
    }
    .team-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .score-ns .team-label { color: var(--ns-score); }
    .score-ew .team-label { color: var(--ew-score); }
    .score-ns.is-vul .team-label { color: #8b1a08; }
    .score-ew.is-vul .team-label { color: #8b1a08; }
    .team-total { font-size: 52px; font-weight: 900; line-height: 1; }
    .ns-total { color: var(--ns-score); }
    .ew-total { color: var(--ew-score); }
    .score-ns.is-vul .ns-total { color: #8b1a08; }
    .score-ew.is-vul .ew-total { color: #8b1a08; }
    .score-sep { width: 4px; background: linear-gradient(to bottom, var(--ns-border), var(--ew-border)); }

    /* ── VUL LEGEND ── */
    .vul-legend {
      margin: 10px 14px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .vul-legend span { font-weight: 800; color: var(--text-soft); }
    .vl-item { display: flex; align-items: center; gap: 4px; }
    .vl-dot { width: 10px; height: 10px; border-radius: 2px; }
    .vl-none { background: var(--surface2); border: 1px solid var(--border); }
    .vl-ns   { background: rgba(180,30,10,0.15); border: 1px solid #e05030; }
    .vl-ew   { background: rgba(180,30,10,0.15); border: 1px solid #e05030; }
    .vl-all  { background: rgba(180,30,10,0.25); border: 1px solid #c02010; }

    /* ── PLAYERS BAR ── */
    .players-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin: 10px 14px 0;
      padding: 12px 14px; box-shadow: var(--shadow-sm);
    }
    .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .player-input-group { display: flex; align-items: center; gap: 7px; }
    .player-label { font-size: 17px; font-weight: 900; width: 22px; text-align: center; }
    .label-N, .label-S { color: var(--ns-score); }
    .label-E, .label-W { color: var(--ew-score); }
    .player-input-group input {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      padding: 8px 10px; font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      width: 100%; min-height: 44px;
    }
    .player-input-group input:focus { outline: none; border-color: var(--ns-border); background: #fff; }
    .player-btns { display: flex; gap: 8px; }
    .btn {
      padding: 10px 18px; border-radius: 8px; border: none;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 800; transition: all 0.15s;
      min-height: 44px; touch-action: manipulation;
    }
    .btn-primary { background: #2563eb; color: #fff; flex: 1; }
    .btn-primary:hover, .btn-primary:active { background: #1a4db8; }
    .btn-danger { background: transparent; color: var(--neg); border: 2px solid var(--neg); flex: 1; }
    .btn-danger:hover, .btn-danger:active { background: var(--ew-bg); }

    /* ── TABLE ── */
    .table-wrap {
      margin: 12px 14px 0; overflow-x: auto;
      border-radius: 12px; box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }
    table.score-table {
      width: 100%; border-collapse: collapse;
      min-width: 620px; background: var(--surface);
    }
    table.score-table thead th {
      padding: 12px 8px; font-size: 14px; font-weight: 900;
      text-align: center; border-bottom: 3px solid var(--border-strong);
      white-space: nowrap;
    }
    th.th-num  { background: var(--header-bg); color: #9aa3b5; width: 32px; }
    /* Column order: N E S W  (N and S = NS team, E and W = EW team but interleaved) */
    th.th-N    { background: var(--ns-head); color: #fff; }
    th.th-E    { background: var(--ew-head); color: #fff; }
    th.th-S    { background: var(--ns-head); color: #fff; }
    th.th-W    { background: var(--ew-head); color: #fff; }
    th.th-vul  { background: #3a2020; color: #ffaa88; width: 46px; font-size: 11px; }
    th.th-con  { background: #2d3350; color: #c8cedc; min-width: 140px; }
    th.th-trk  { background: #2d3350; color: #c8cedc; width: 76px; }
    th.th-del  { background: var(--header-bg); width: 36px; }

    /* Row vulnerability tinting */
    tr.vul-ns td.col-N, tr.vul-ns td.col-S { background: var(--vul-tint) !important; }
    tr.vul-ew td.col-E, tr.vul-ew td.col-W { background: var(--vul-tint) !important; }
    tr.vul-all td.col-N, tr.vul-all td.col-S,
    tr.vul-all td.col-E, tr.vul-all td.col-W { background: rgba(180,30,10,0.13) !important; }

    /* Vul indicator stripe cell */
    td.vul-cell { width: 46px; padding: 6px 4px !important; }
    .vul-pill {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; letter-spacing: 0.5px;
      padding: 3px 5px; border-radius: 6px; white-space: nowrap;
    }
    .vp-none { background: var(--surface2); color: var(--text-soft); border: 1px solid var(--border); }
    .vp-ns   { background: #ffd0cc; color: #8b1a08; border: 1px solid #e05030; }
    .vp-ew   { background: #ffd0cc; color: #8b1a08; border: 1px solid #e05030; }
    .vp-all  { background: #ffb8b0; color: #6b0a00; border: 1px solid #c02010; font-weight: 900; }

    table.score-table tbody tr:nth-child(odd)  { background: var(--surface); }
    table.score-table tbody tr:nth-child(even) { background: var(--surface2); }
    table.score-table tbody tr:hover { background: #e8effe; }
    table.score-table td {
      padding: 9px 6px; border-bottom: 1px solid var(--border);
      text-align: center; vertical-align: middle;
    }
    td.td-num { color: var(--text-soft); font-size: 13px; font-weight: 700; }

    .score-cell    { font-size: 20px; font-weight: 900; min-width: 62px; }
    .score-pos     { color: var(--ns-score); }
    .score-neg     { color: var(--neg); }
    .score-ew-pos  { color: var(--ew-score); }
    .score-ew-neg  { color: var(--neg); }

    /* Contract button */
    .contract-btn {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      padding: 7px 9px; font-family: 'Nunito', sans-serif;
      font-size: 14px; cursor: pointer;
      width: 100%; min-width: 125px; text-align: left;
      transition: all 0.15s; touch-action: manipulation; min-height: 44px;
    }
    .contract-btn:hover, .contract-btn:active { border-color: var(--ns-border); background: var(--ns-bg); }
    .contract-btn.filled { border-color: var(--ns-border); background: #eef4ff; }
    .contract-display { font-size: 15px; font-weight: 900; color: var(--text); }
    .contract-sub { font-size: 11px; color: var(--text-mid); margin-top: 1px; font-weight: 600; }
    .suit-D-c, .suit-H-c { color: #cc2200; }
    .no-contract-hint { color: var(--text-soft); font-size: 12px; font-weight: 600; }

    /* Tricks select */
    .tricks-select {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      padding: 7px 4px; font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      width: 66px; text-align: center; cursor: pointer;
      min-height: 44px; touch-action: manipulation;
    }
    .tricks-select:focus { outline: none; border-color: var(--ns-border); }
    .tricks-select:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Delete button */
    .del-btn {
      background: transparent; border: 1.5px solid #dda0a0; color: #cc3333;
      border-radius: 6px; width: 32px; height: 32px;
      cursor: pointer; font-size: 15px; font-weight: 700; line-height: 1;
      transition: all 0.15s; touch-action: manipulation;
    }
    .del-btn:hover, .del-btn:active { background: var(--ew-bg); border-color: var(--neg); }

    /* Totals footer */
    tr.totals-row td {
      background: var(--header-bg); border-top: 3px solid var(--border-strong);
      font-size: 16px; font-weight: 900; padding: 11px 6px; color: #fff;
    }
    /* colors now set inline on totals cells */

    /* Add row button */
    .add-row-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 12px 14px 0; padding: 13px;
      background: var(--surface); border: 2px dashed var(--border-strong);
      border-radius: 10px; color: var(--text-mid);
      cursor: pointer; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 700;
      width: calc(100% - 28px); transition: all 0.18s;
      min-height: 50px; touch-action: manipulation;
    }
    .add-row-btn:hover, .add-row-btn:active { border-color: var(--ns-border); color: var(--ns-score); background: var(--ns-bg); }
    .add-row-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    /* ── MODAL (bottom sheet on mobile) ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(20,25,40,0.6); z-index: 100;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 32px;
      width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
      position: relative;
    }
    @media (min-width: 560px) {
      .modal-overlay { align-items: center; }
      .modal { border-radius: 16px; padding: 24px 26px 22px; max-height: 88vh; }
    }
    .modal-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 4px; margin: 0 auto 16px;
    }
    @media (min-width: 560px) { .modal-handle { display: none; } }
    .modal h2 { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .modal-vul-info {
      font-size: 13px; font-weight: 700; margin-bottom: 16px;
      padding: 7px 12px; border-radius: 8px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .mvi-none { background: var(--surface2); color: var(--text-soft); }
    .mvi-ns   { background: #ffd0cc; color: #8b1a08; }
    .mvi-ew   { background: #ffd0cc; color: #8b1a08; }
    .mvi-all  { background: #ffb8b0; color: #6b0a00; }
    .modal-section { margin-bottom: 14px; }
    .section-label {
      display: block; font-size: 11px; font-weight: 800;
      letter-spacing: 2px; color: var(--text-soft);
      margin-bottom: 7px; text-transform: uppercase;
    }
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill-group input[type=radio] { display: none; }
    .pill-group label {
      padding: 9px 16px; border-radius: 24px;
      border: 1.5px solid var(--border);
      cursor: pointer; font-size: 15px; font-weight: 700;
      background: var(--surface2); color: var(--text-mid);
      transition: all 0.13s; user-select: none;
      min-height: 44px; display: flex; align-items: center;
      touch-action: manipulation;
    }
    .pill-group label:hover, .pill-group label:active { border-color: #2563eb; color: #2563eb; background: var(--ns-bg); }
    .pill-group input[type=radio]:checked + label { background: #2563eb; color: #fff; border-color: #2563eb; }
    label.suit-D-p, label.suit-H-p { color: #cc2200; }
    .pill-group input[type=radio]:checked + label.suit-D-p,
    .pill-group input[type=radio]:checked + label.suit-H-p { background: #cc2200; border-color: #cc2200; color: #fff; }
    .caller-ns input[type=radio]:checked + label { background: var(--ns-head); border-color: var(--ns-head); color: #fff; }
    .caller-ew input[type=radio]:checked + label { background: var(--ew-head); border-color: var(--ew-head); color: #fff; }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none;
      color: var(--text-soft); font-size: 22px; cursor: pointer; line-height: 1;
      touch-action: manipulation;
    }
    .modal-close:hover { color: var(--text); }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions .btn { flex: 1; padding: 12px; font-size: 15px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1c2030; color: #fff;
      padding: 11px 26px; border-radius: 30px;
      font-weight: 700; font-size: 15px;
      opacity: 0; transition: all 0.28s;
      pointer-events: none; z-index: 300;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── LOADING ── */
    .loading {
      position: fixed; inset: 0; background: rgba(238,241,246,0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; font-size: 18px; font-weight: 800; color: var(--text-mid);
    }
    .loading.hidden { display: none; }

    @media (max-width: 480px) {
      .header h1 { font-size: 17px; }
      .team-total { font-size: 42px; }
      .score-cell { font-size: 17px; }
    }
  </style>
</head>
<body>

<div class="loading" id="loading">Loading game…</div>

<!-- HEADER -->
<div class="header">
  <a href="/bridge">← Bridge</a>
  <h1>🃏 Bridge Score</h1>
  <span class="suits">
    <span class="suit-blk">♠</span><span class="suit-red">♥</span>
    <span class="suit-red">♦</span><span class="suit-blk">♣</span>
  </span>
</div>

<!-- SYNC -->
<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-text">Connecting…</span>
</div>

<!-- SCOREBOARD -->
<div class="scoreboard">
  <div class="score-ns" id="sb-ns">
    <div class="team-label">North · South</div>
    <div class="team-total ns-total" id="ns-grand">0</div>
  </div>
  <div class="score-sep"></div>
  <div class="score-ew" id="sb-ew">
    <div class="team-label">East · West</div>
    <div class="team-total ew-total" id="ew-grand">0</div>
  </div>
</div>

<!-- VUL LEGEND -->
<div class="vul-legend">
  <span>VUL:</span>
  <div class="vl-item"><div class="vl-dot vl-none"></div> None</div>
  <div class="vl-item"><div class="vl-dot vl-ns"></div> NS</div>
  <div class="vl-item"><div class="vl-dot vl-ew"></div> EW</div>
  <div class="vl-item"><div class="vl-dot vl-all"></div> All</div>
  <span style="margin-left:4px">· cycles every 4 rounds</span>
</div>

<!-- PLAYERS BAR -->
<div class="players-bar">
  <div class="players-grid">
    <div class="player-input-group">
      <span class="player-label label-N">N</span>
      <input type="text" id="name-N" placeholder="North" maxlength="12"/>
    </div>
    <div class="player-input-group">
      <span class="player-label label-E">E</span>
      <input type="text" id="name-E" placeholder="East" maxlength="12"/>
    </div>
    <div class="player-input-group">
      <span class="player-label label-S">S</span>
      <input type="text" id="name-S" placeholder="South" maxlength="12"/>
    </div>
    <div class="player-input-group">
      <span class="player-label label-W">W</span>
      <input type="text" id="name-W" placeholder="West" maxlength="12"/>
    </div>
  </div>
  <div class="player-btns">
    <button class="btn btn-primary" onclick="savePlayers()">Save Names</button>
    <button class="btn btn-danger"  onclick="confirmReset()">Reset All</button>
  </div>
</div>

<!-- TABLE  — column order: # | N | E | S | W | VUL | Contract | Tricks | del -->
<div class="table-wrap">
  <table class="score-table">
    <thead>
      <tr>
        <th class="th-num">#</th>
        <th class="th-N" id="th-N">N</th>
        <th class="th-E" id="th-E">E</th>
        <th class="th-S" id="th-S">S</th>
        <th class="th-W" id="th-W">W</th>
        <th class="th-vul">VUL</th>
        <th class="th-con">Contract</th>
        <th class="th-trk">Tricks</th>
        <th class="th-del"></th>
      </tr>
    </thead>
    <tbody id="score-tbody"></tbody>
    <tfoot>
      <tr class="totals-row">
        <td></td>
        <td id="ns-total-N" style="text-align:center;color:#7eb8ff"></td>
        <td id="ew-total-E" style="text-align:center;color:#ffaa88"></td>
        <td id="ns-total-S" style="text-align:center;color:#7eb8ff"></td>
        <td id="ew-total-W" style="text-align:center;color:#ffaa88"></td>
        <td colspan="4" style="color:#9aa3b5;font-size:12px;text-align:right;padding-right:12px;font-weight:700">MAX 12</td>
      </tr>
    </tfoot>
  </table>
</div>

<button class="add-row-btn" id="add-row-btn" onclick="addRow()">+ Add Round</button>

<div class="toast" id="toast"></div>

<!-- CONTRACT MODAL — vulnerability is shown, NOT asked -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>Set Contract</h2>
    <!-- Auto-vul info line — filled by JS -->
    <div class="modal-vul-info mvi-none" id="modal-vul-info">⚪ No one vulnerable</div>

    <div class="modal-section">
      <span class="section-label">Bid Level</span>
      <div class="pill-group">
        <input type="radio" name="m_bid" id="mb1" value="1"><label for="mb1">1</label>
        <input type="radio" name="m_bid" id="mb2" value="2"><label for="mb2">2</label>
        <input type="radio" name="m_bid" id="mb3" value="3"><label for="mb3">3</label>
        <input type="radio" name="m_bid" id="mb4" value="4"><label for="mb4">4</label>
        <input type="radio" name="m_bid" id="mb5" value="5"><label for="mb5">5</label>
        <input type="radio" name="m_bid" id="mb6" value="6"><label for="mb6">6</label>
        <input type="radio" name="m_bid" id="mb7" value="7"><label for="mb7">7</label>
      </div>
    </div>

    <div class="modal-section">
      <span class="section-label">Suit</span>
      <div class="pill-group">
        <input type="radio" name="m_suite" id="msC" value="C"><label for="msC">♣ Clubs</label>
        <input type="radio" name="m_suite" id="msD" value="D"><label for="msD" class="suit-D-p">♦ Diamonds</label>
        <input type="radio" name="m_suite" id="msH" value="H"><label for="msH" class="suit-H-p">♥ Hearts</label>
        <input type="radio" name="m_suite" id="msS" value="S"><label for="msS">♠ Spades</label>
        <input type="radio" name="m_suite" id="msN" value="N"><label for="msN">NT</label>
      </div>
    </div>

    <div class="modal-section">
      <span class="section-label">Double</span>
      <div class="pill-group">
        <input type="radio" name="m_double" id="mdN" value="Normal" checked><label for="mdN">Normal</label>
        <input type="radio" name="m_double" id="mdD" value="Double"><label for="mdD">✗✗ Double</label>
        <input type="radio" name="m_double" id="mdR" value="Redouble"><label for="mdR">✗✗✗✗ Rdbl</label>
      </div>
    </div>

    <div class="modal-section">
      <span class="section-label">Caller (Declarer)</span>
      <div class="pill-group caller-ns" style="margin-bottom:8px">
        <input type="radio" name="m_caller" id="mcN" value="N"><label for="mcN" id="mcN-lbl">N</label>
        <input type="radio" name="m_caller" id="mcS" value="S"><label for="mcS" id="mcS-lbl">S</label>
      </div>
      <div class="pill-group caller-ew">
        <input type="radio" name="m_caller" id="mcE" value="E"><label for="mcE" id="mcE-lbl">E</label>
        <input type="radio" name="m_caller" id="mcW" value="W"><label for="mcW" id="mcW-lbl">W</label>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveContract()">Save Contract</button>
      <button class="btn btn-danger"  onclick="clearContract()">Clear</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>

// ═══════════════════════════════════════════════
//  VULNERABILITY SEQUENCE
//  Round index (0-based):  0→none, 1→ns, 2→ew, 3→all, repeat
// ═══════════════════════════════════════════════
const VUL_SEQ = ['none','ns','ew','all'];  // repeating cycle

function vulForRound(idx) {
  return VUL_SEQ[idx % 4];
}

// Is NS vulnerable on a given round?
function nsVul(vul) { return vul === 'ns' || vul === 'all'; }
// Is EW vulnerable on a given round?
function ewVul(vul) { return vul === 'ew' || vul === 'all'; }

// Map vul string → what calculate_point expects for a given caller
function vulForCaller(vul, callerIsNS) {
  const teamVul = callerIsNS ? nsVul(vul) : ewVul(vul);
  return teamVul ? 'Vulnerable' : 'NotVulnerable';
}

// ═══════════════════════════════════════════════
//  SCORING (mirrors calculate_point)
// ═══════════════════════════════════════════════
function calculatePoint(bid, suite, win, double_, vul_str) {
  let sp=30,dbl=1,ps=0,pb=0,gs=0,fc=0,os=0,om=0,ds=0,sb=0;
  const nvd=[0,100,300,500,800,1100,1400,1700,2000,2300,2600,2900,3200,3500];
  const vd =[0,200,500,800,1100,1400,1700,2000,2300,2600,2900,3200,3500,3800];
  const nvr=[0,200,600,1000,1600,2200,2800,3400,4000,4600,5200,5800,6400,7000];
  const vr =[0,400,1000,1600,2200,2800,3400,4000,4600,5200,5800,6400,7000,7600];
  if(suite==='C'||suite==='D')sp=20;
  if(double_==='Double'){om=vul_str==='Vulnerable'?200:100;dbl=2;fc=50;}
  else if(double_==='Redouble'){om=vul_str==='Vulnerable'?400:200;dbl=4;fc=100;}
  const ot=win-bid-6;
  let bp=bid*sp,wp=(win-6)*sp;
  if(suite==='N'){bp+=10;wp+=10;}
  bp*=dbl;wp*=dbl;
  let total;
  if(ot<0){
    fc=0;const i=-ot;
    if(double_==='Redouble')ds=vul_str==='Vulnerable'?vr[i]:nvr[i];
    else if(double_==='Double')ds=vul_str==='Vulnerable'?vd[i]:nvd[i];
    else ds=i*(vul_str==='Vulnerable'?100:50);
    total=-ds;
  }else{
    if(bp>=100){gs=vul_str==='Vulnerable'?500:300;if(bid===7)sb=vul_str==='Vulnerable'?1500:1000;else if(bid===6)sb=vul_str==='Vulnerable'?750:500;}
    else pb=50;
    ps=dbl===1?wp:bp;os=ot*om;total=ps+fc+gs+pb+os+sb;
  }
  return total;
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let state = {players:{N:'North',S:'South',E:'East',W:'West'}, rows:[]};
let isSyncing = false;

// ═══════════════════════════════════════════════
//  SOCKETIO
// ═══════════════════════════════════════════════
const socket = io();
socket.on('connect', () => { setSyncStatus('live','Live — all devices synced'); fetchState(); });
socket.on('disconnect', () => setSyncStatus('error','Disconnected — reconnecting…'));
socket.on('bridge_state_update', newState => {
  isSyncing = true; state = newState; renderAll(); isSyncing = false;
  setSyncStatus('live','Live — synced just now');
});

function setSyncStatus(type, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + type;
  document.getElementById('sync-text').textContent = msg;
}

// ═══════════════════════════════════════════════
//  FETCH / PUSH
// ═══════════════════════════════════════════════
function fetchState() {
  fetch('/bridge/state').then(r=>r.json()).then(d=>{
    if(d.status==='success'){ state=d.state; renderAll(); }
    document.getElementById('loading').classList.add('hidden');
    setSyncStatus('live','Live — all devices synced');
  }).catch(()=>{ document.getElementById('loading').classList.add('hidden'); setSyncStatus('error','Could not load state'); });
}

function pushState() {
  if(isSyncing) return;
  setSyncStatus('syncing','Saving…');
  fetch('/bridge/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)})
    .then(r=>r.json())
    .then(d=>{ if(d.status==='success') setSyncStatus('live','Live — all devices synced'); else setSyncStatus('error','Save failed'); })
    .catch(()=>setSyncStatus('error','Network error'));
}

// ═══════════════════════════════════════════════
//  PLAYERS
// ═══════════════════════════════════════════════
function savePlayers() {
  ['N','S','E','W'].forEach(p=>{ const v=document.getElementById('name-'+p).value.trim(); if(v) state.players[p]=v; });
  pushState(); renderAll(); toast('Names saved ✓');
}
function loadPlayerInputs() {
  ['N','S','E','W'].forEach(p=>{ document.getElementById('name-'+p).value = state.players[p]||''; });
}
function updateHeaders() {
  ['N','E','S','W'].forEach(p=>{  // NESW order
    const h=document.getElementById('th-'+p); if(h) h.textContent=state.players[p]||p;
    const l=document.getElementById('mc'+p+'-lbl'); if(l) l.textContent=(state.players[p]||p).substring(0,10);
  });
}

// ═══════════════════════════════════════════════
//  SCOREBOARD VUL HIGHLIGHT
//  Shows which team is currently vulnerable based
//  on the NEXT row to be played (last row index)
// ═══════════════════════════════════════════════
function updateScoreboardVul() {
  const nextIdx = state.rows.length - 1; // last row = current round
  const vul = vulForRound(nextIdx);
  const sbNS = document.getElementById('sb-ns');
  const sbEW = document.getElementById('sb-ew');
  sbNS.classList.toggle('is-vul', nsVul(vul));
  sbEW.classList.toggle('is-vul', ewVul(vul));
}

// ═══════════════════════════════════════════════
//  ROWS
// ═══════════════════════════════════════════════
function addRow() {
  if(state.rows.length>=12){toast('Maximum 12 rounds reached');return;}
  state.rows.push({id:Date.now(), contract:null, tricks:null});
  pushState(); renderTable(); updateTotals(); updateAddBtn(); updateScoreboardVul();
}

function deleteRow(id) {
  if(state.rows.length<=1){toast('At least one row required');return;}
  if(!confirm('Delete this round? This cannot be undone.')) return;
  state.rows = state.rows.filter(r=>r.id!==id);
  pushState(); renderTable(); updateTotals(); updateAddBtn(); updateScoreboardVul();
}

function getRowScore(row, idx) {
  if(!row.contract || row.tricks===null) return null;
  const c = row.contract;
  const vul = vulForRound(idx);
  const callerNS = c.caller==='N' || c.caller==='S';
  const vul_str = vulForCaller(vul, callerNS);
  return {
    score: calculatePoint(+c.bid, c.suite, +row.tricks, c.double, vul_str),
    callerNS
  };
}

// ═══════════════════════════════════════════════
//  RENDER TABLE
// ═══════════════════════════════════════════════
function renderTable() {
  const tbody = document.getElementById('score-tbody');
  tbody.innerHTML = '';
  const syms = {C:'♣',D:'♦',H:'♥',S:'♠',N:'NT'};

  // Vul pill config
  const vulMeta = {
    none: {cls:'vp-none', label:'—'},
    ns:   {cls:'vp-ns',   label:'NS'},
    ew:   {cls:'vp-ew',   label:'EW'},
    all:  {cls:'vp-all',  label:'ALL'},
  };
  const vulRowClass = {none:'',ns:'vul-ns',ew:'vul-ew',all:'vul-all'};

  state.rows.forEach((row, idx) => {
    const vul = vulForRound(idx);
    const vm  = vulMeta[vul];
    const sc  = getRowScore(row, idx);

    let nS='', eS='', sS='', wS='';
    let nC='', eC='', sC='', wC='';

    if(sc) {
      const caller = row.contract ? row.contract.caller : null;
      const posScore = sc.score >= 0;
      if(caller === 'N') {
        nS = sc.score; nC = posScore ? 'score-pos' : 'score-neg';
      } else if(caller === 'S') {
        sS = sc.score; sC = posScore ? 'score-pos' : 'score-neg';
      } else if(caller === 'E') {
        eS = sc.score; eC = posScore ? 'score-ew-pos' : 'score-ew-neg';
      } else if(caller === 'W') {
        wS = sc.score; wC = posScore ? 'score-ew-pos' : 'score-ew-neg';
      }
    }

    // Contract cell
    const c = row.contract;
    let cHTML = '';
    if(c) {
      const sym   = syms[c.suite]||c.suite;
      const sCls  = (c.suite==='D'||c.suite==='H') ? 'suit-D-c' : '';
      const dStr  = c.double==='Double'?' ✗✗':c.double==='Redouble'?' ✗✗✗✗':'';
      cHTML = `<button class="contract-btn filled" onclick="openModal(${row.id})">
        <div class="contract-display">${c.bid}<span class="${sCls}">${sym}</span>${dStr}</div>
        <div class="contract-sub">Caller: ${state.players[c.caller]||c.caller}</div>
      </button>`;
    } else {
      cHTML = `<button class="contract-btn" onclick="openModal(${row.id})">
        <span class="no-contract-hint">tap to set contract…</span>
      </button>`;
    }

    // Tricks dropdown
    let tOpts = '<option value="">–</option>';
    for(let i=1;i<=13;i++) tOpts+=`<option value="${i}"${row.tricks==i?' selected':''}>${i}</option>`;
    const tSel = `<select class="tricks-select"${!c?' disabled':''} onchange="setTricks(${row.id},this.value)">${tOpts}</select>`;

    const tr = document.createElement('tr');
    tr.className = vulRowClass[vul];
    // Column order: # | N | E | S | W | VUL | Contract | Tricks | del
    tr.innerHTML = `
      <td class="td-num">${idx+1}</td>
      <td class="score-cell col-N ${nC}">${nS!==''?nS:''}</td>
      <td class="score-cell col-E ${eC}">${eS!==''?eS:''}</td>
      <td class="score-cell col-S ${sC}">${sS!==''?sS:''}</td>
      <td class="score-cell col-W ${wC}">${wS!==''?wS:''}</td>
      <td class="vul-cell"><span class="vul-pill ${vm.cls}">${vm.label}</span></td>
      <td>${cHTML}</td>
      <td>${tSel}</td>
      <td><button class="del-btn" onclick="deleteRow(${row.id})">✕</button></td>`;
    tbody.appendChild(tr);
  });
}

// ═══════════════════════════════════════════════
//  TRICKS + TOTALS
// ═══════════════════════════════════════════════
function setTricks(id, val) {
  const row = state.rows.find(r=>r.id===id); if(!row) return;
  row.tricks = val ? +val : null;
  pushState(); renderTable(); updateTotals();
}

function updateTotals() {
  let ns=0, ew=0;
  state.rows.forEach((row, idx) => {
    const sc = getRowScore(row, idx); if(!sc) return;
    if(sc.callerNS){ if(sc.score>=0) ns+=sc.score; else ew+=(-sc.score); }
    else           { if(sc.score>=0) ew+=sc.score; else ns+=(-sc.score); }
  });
  document.getElementById('ns-grand').textContent = ns;
  document.getElementById('ew-grand').textContent = ew;
  // Footer: show NS total under N & S cols, EW total under E & W cols
  document.getElementById('ns-total-N').textContent = ns ? 'NS: '+ns : '';
  document.getElementById('ns-total-S').textContent = ns ? ns : '';
  document.getElementById('ew-total-E').textContent = ew ? 'EW: '+ew : '';
  document.getElementById('ew-total-W').textContent = ew ? ew : '';
}

function updateAddBtn() {
  const b = document.getElementById('add-row-btn');
  b.disabled = state.rows.length >= 12;
  b.textContent = state.rows.length>=12
    ? '✓ Maximum 12 rounds reached'
    : `+ Add Round  (${state.rows.length} / 12)`;
}

// ═══════════════════════════════════════════════
//  MODAL — vul is auto, just shown in info line
// ═══════════════════════════════════════════════
let activeRowId = null;

const vulInfoText = {
  none: {cls:'mvi-none', txt:'⚪ No one vulnerable'},
  ns:   {cls:'mvi-ns',   txt:'🔴 NS Vulnerable'},
  ew:   {cls:'mvi-ew',   txt:'🔴 EW Vulnerable'},
  all:  {cls:'mvi-all',  txt:'🔴 Both teams Vulnerable'},
};

function openModal(id) {
  activeRowId = id;
  const row = state.rows.find(r=>r.id===id); if(!row) return;
  const idx = state.rows.indexOf(row);
  const vul = vulForRound(idx);
  const vi  = vulInfoText[vul];

  // Update vul info line
  const infoEl = document.getElementById('modal-vul-info');
  infoEl.className = 'modal-vul-info '+vi.cls;
  infoEl.textContent = vi.txt;

  // Reset modal fields
  document.querySelector('input[name="m_double"][value="Normal"]').checked = true;
  ['m_bid','m_suite','m_caller'].forEach(n=>{
    const e=document.querySelector(`input[name="${n}"]:checked`); if(e) e.checked=false;
  });

  // Fill if contract exists
  if(row.contract) {
    const c = row.contract;
    [['m_bid',c.bid],['m_suite',c.suite],['m_double',c.double],['m_caller',c.caller]].forEach(([n,v])=>{
      const e=document.querySelector(`input[name="${n}"][value="${v}"]`); if(e) e.checked=true;
    });
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  activeRowId = null;
}

function saveContract() {
  if(!activeRowId) return;
  const row = state.rows.find(r=>r.id===activeRowId); if(!row) return;
  const bid    = document.querySelector('input[name="m_bid"]:checked');
  const suite  = document.querySelector('input[name="m_suite"]:checked');
  const dbl    = document.querySelector('input[name="m_double"]:checked');
  const caller = document.querySelector('input[name="m_caller"]:checked');
  if(!bid||!suite||!caller){ toast('Please select Bid, Suit and Caller'); return; }
  // Vul is NOT stored in contract — it's computed from row index at scoring time
  row.contract = {
    bid: +bid.value, suite: suite.value,
    double: dbl ? dbl.value : 'Normal',
    caller: caller.value
  };
  row.tricks = null;
  pushState(); closeModal(); renderTable(); updateTotals(); toast('Contract saved ✓');
}

function clearContract() {
  if(!activeRowId) return;
  const row = state.rows.find(r=>r.id===activeRowId);
  if(row){ row.contract=null; row.tricks=null; }
  pushState(); closeModal(); renderTable(); updateTotals();
}

document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ═══════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════
function confirmReset() {
  if(!confirm('Reset ALL scores and names for everyone? This cannot be undone.')) return;
  fetch('/bridge/state/reset',{method:'POST'}).then(r=>r.json()).then(d=>{
    if(d.status==='success'){ state=d.state; renderAll(); toast('Game reset ✓'); }
  });
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let tt;
function toast(msg){
  const e=document.getElementById('toast'); e.textContent=msg; e.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>e.classList.remove('show'),2400);
}

// ═══════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════
function renderAll(){
  loadPlayerInputs(); updateHeaders();
  renderTable(); updateTotals(); updateAddBtn(); updateScoreboardVul();
}

fetchState();
</script>
</body>
</html>
