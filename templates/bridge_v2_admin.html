<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <title>Bridge Admin</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        .room-row { 
            display: flex; justify-content: space-between; align-items: center;
            background: #161b22; margin-bottom: 10px; padding: 15px; border-radius: 8px;
        }
        .reset-btn { background: #f85149; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .status { color: #8b949e; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Bridge Admin Control</h1>
    <div id="rooms">
        {% for id, data in rooms.items() %}
        <div class="room-row" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #161b22; margin-bottom: 10px; border-radius: 8px;">
            <div>
                <strong>Room {{ id }}</strong>
                <div class="status" style="color: #8b949e; font-size: 0.85rem;">
                    N: {{ "Occupied" if data.players.N else "Empty" }} | 
                    E: {{ "Occupied" if data.players.E else "Empty" }} | 
                    S: {{ "Occupied" if data.players.S else "Empty" }} | 
                    W: {{ "Occupied" if data.players.W else "Empty" }}
                </div>
            </div>

            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="dealer-{{ id }}" style="background: #0d1117; color: white; border: 1px solid #30363d; padding: 5px; border-radius: 4px;">
                    <option value="N" selected>North</option>
                    <option value="E">East</option>
                    <option value="S">South</option>
                    <option value="W">West</option>
                </select>
                
                <button onclick="setDealer('{{ id }}')" style="background: #238636; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;">Set Next Dealer</button>
                
                <button class="reset-btn" onclick="resetRoom('{{ id }}')" style="background: #da3633; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;">Reset Game</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
    const socket = io();
    function setDealer(roomId) {
        const dealer = document.getElementById(`dealer-${roomId}`).value;
        socket.emit('admin_set_dealer', { room_id: roomId, force_dealer: dealer });
        alert("Next dealer set to " + dealer);
    }

    function resetRoom(roomId) {
        const dealer = document.getElementById(`dealer-${roomId}`).value;
        // No password prompt anymore
        socket.emit('admin_reset', { room_id: roomId, force_dealer: dealer });
    }
    
    socket.on('room_was_reset', () => location.reload());
    </script>
</body>
</html>
