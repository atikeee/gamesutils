<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Lobby</title>
    <style>
        :root { --bg: #0d1117; --surface: #161b22; --text: #e6edf3; --accent: #58a6ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--surface); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        select, input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #30363d; color: white; border-radius: 4px; }
        .seat-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .seat-btn { padding: 15px; border: 1px solid var(--accent); background: transparent; color: white; border-radius: 6px; cursor: pointer; }
        .seat-btn.active { background: var(--accent); }
        .seat-btn:disabled { border-color: #f85149; color: #f85149; cursor: not-allowed; opacity: 0.5; }
        .join-btn { width: 100%; padding: 15px; background: #238636; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Bridge Tournament</h2>
    
    <label>Select Room:</label>
    <select id="room-select" onchange="refreshSeats()">
        {% for i in range(1, 11) %}
        <option value="{{ i }}">Room {{ i }}</option>
        {% endfor %}
    </select>

    <input type="text" id="player-name" placeholder="Your Name">

    <label>Pick Your Seat:</label>
    <div class="seat-picker">
        <button class="seat-btn" id="btn-N" onclick="selectSeat('N')">North</button>
        <button class="seat-btn" id="btn-E" onclick="selectSeat('E')">East</button>
        <button class="seat-btn" id="btn-S" onclick="selectSeat('S')">South</button>
        <button class="seat-btn" id="btn-W" onclick="selectSeat('W')">West</button>
    </div>

    <button class="join-btn" onclick="requestJoin()">JOIN GAME</button>
</div>

<script>
    let selectedSeat = null;

    async function refreshSeats() {
        const roomId = document.getElementById('room-select').value;
        const res = await fetch(`/bridge_v2/check_seats/${roomId}`);
        const seats = await res.json();
        
        ['N','E','S','W'].forEach(dir => {
            const btn = document.getElementById(`btn-${dir}`);
            if (seats[dir]) {
                btn.disabled = true;
                btn.innerText = dir + " (Occupied)";
                if(selectedSeat === dir) selectedSeat = null;
            } else {
                btn.disabled = false;
                btn.innerText = dir;
            }
        });
    }

    function selectSeat(dir) {
        selectedSeat = dir;
        document.querySelectorAll('.seat-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${dir}`).classList.add('active');
    }

    async function requestJoin() {
        const name = document.getElementById('player-name').value;
        const roomId = document.getElementById('room-select').value;

        if (!name || !selectedSeat) return alert("Please enter name and select an available seat");

        const res = await fetch('/bridge_v2/join', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ room_id: roomId, direction: selectedSeat, name: name })
        });

        const data = await res.json();
        if (data.status === 'success') {
            alert("Your Passcode: " + data.passcode);
            localStorage.setItem(`bridge_v2_pass`, data.passcode); 
            window.location.href = `/bridge_v2/game/${roomId}/${selectedSeat}`;
        } else {
            alert(data.error);
        }
    }

    // Initialize
    refreshSeats();
    setInterval(refreshSeats, 5000); // Auto-refresh seats every 5s
</script>
</body>
</html>
